name: Build Desktop Executable

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4  # 🚀 升级到最新的 V4

    - name: Set up Python
      uses: actions/setup-python@v5  # 🚀 升级到最新的 V5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter pyinstaller

    - name: Package Application via PyInstaller
      run: |
        pyinstaller --noconsole --onefile --name="StudyEngine" study_engine.py

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4  # 🚀 升级到最新的 V4，解决报错核心
      with:
        name: StudyEngine-Windows
        path: dist/StudyEngine.exe
