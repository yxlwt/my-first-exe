name: Build Desktop Executable

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet pyinstaller  # 🚀 把 pyinstaller 加回来了

    - name: Package Application via Flet
      run: |
        flet pack study_engine.py --name "StudyEngine"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: StudyEngine-Windows
        path: dist/StudyEngine.exe
