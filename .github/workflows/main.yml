name: Build Desktop Executable

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter pyinstaller

    - name: Package Application via PyInstaller
      run: |
        pyinstaller --noconsole --onefile --name="StudyEngine" study_engine.py

    - name: Upload Build Artifact Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: StudyEngine-Windows
        path: dist/StudyEngine.exe
